name: Container Workflow
on:
  workflow_dispatch:
    inputs:
      Build-Container:
        description: 'Build Container'
        required: true
        type: boolean
        default: false
      Deploy-to-AKS:
        description: 'Deploy to AKS'
        required: true
        type: boolean
        default: false
env:
  REGISTRY: aistraining.azurecr.io
  TAG_NAME: eshoponwebapp-user003:1.0.0
  AKS_RESOURCE_GROUP: ais-training
  AKS_CLUSTER_NAME: aks-demo
  AZURE_SUBSCRIPTION_ID: 06c626d1-2f07-4d7d-bea5-81ec4cb39cda
jobs:
  build-container:
    if: ${{ inputs.Build-Container }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7.0.0
      - name: ACR Login
        uses: docker/login-action@v4.4.0
        with:
            registry: ${{ env.REGISTRY }}
            username: ${{ secrets.ACR_USERNAME }}
            password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and Push Image
        run: |
          docker build -f src/Web/Dockerfile -t ${{ env.REGISTRY }}/${{ env.TAG_NAME }} .
          docker push ${{ env.REGISTRY }}/${{ env.TAG_NAME }}

  deploy-to-aks:
    if: ${{ inputs.Deploy-to-AKS }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7.0.0

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Subscription and Cluster Visibility
        run: |
          echo "Current subscription:"
          az account show --output table
          echo "Resource group check:"
          az group show --name ${{ env.AKS_RESOURCE_GROUP }} --output table
          echo "AKS clusters visible to this identity:"
          az aks list --output table
          echo "Target cluster check:"
          az aks show --resource-group ${{ env.AKS_RESOURCE_GROUP }} --name ${{ env.AKS_CLUSTER_NAME }} --output table

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}
          subscription: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set up kubectl
        uses: azure/k8s-deploy@v4.9
        with:
          manifests: |
            .k8s/deployment.yaml
            .k8s/service.yaml
          images: |
            ${{ env.REGISTRY }}/${{ env.TAG_NAME }}